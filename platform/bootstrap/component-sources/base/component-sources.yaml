#@ load("@ytt:data", "data")
#@ load("@ytt:overlay", "overlay")
#@ load("@ytt:yaml", "yaml")

#@ def component_id(c):
#@   return c.id if c.id else c.name
#@ end

#@ for component in data.values.components:
---
apiVersion: source.toolkit.fluxcd.io/v1
kind: OCIRepository
metadata:
  name: #@ component_id(component)
  namespace: #@ data.values.component_sources_namespace
  labels:
    app.kubernetes.io/part-of: fedcore
    fedcore.io/component: #@ component_id(component)
spec:
  interval: 5m
  url: #@ "oci://{}/{}/{}-{}".format(data.values.oci_registry, data.values.oci_repository_base, component_id(component), data.values.cluster_name)
  ref:
    #! Use 'tag' for "latest", 'semver' for versioned artifacts
    #@ if component.version == "latest":
    tag: latest
    #@ else:
    semver: #@ component.version
    #@ end
  #@ if hasattr(data.values, 'ca_bundle') and data.values.ca_bundle:
  #! Reference CA certificate secret for custom PKI
  certSecretRef:
    name: #@ data.values.ca_certificates_name
  #@ end
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: #@ component_id(component)
  namespace: #@ data.values.component_sources_namespace
  labels:
    app.kubernetes.io/part-of: fedcore
    fedcore.io/component: #@ component_id(component)
spec:
  interval: 10m
  sourceRef:
    kind: OCIRepository
    name: #@ component_id(component)
  path: ./
  prune: true
  wait: true
  commonMetadata:
    labels:
      app.kubernetes.io/part-of: fedcore
      fedcore.io/component: #@ component_id(component)
  patches:
    #! Patch Deployments to add labels to pod templates
    - patch: #@ yaml.encode([{"op": "add", "path": "/spec/template/metadata/labels/app.kubernetes.io~1part-of", "value": "fedcore"}, {"op": "add", "path": "/spec/template/metadata/labels/fedcore.io~1component", "value": component_id(component)}])
      target:
        kind: Deployment
    #! Patch StatefulSets to add labels to pod templates
    - patch: #@ yaml.encode([{"op": "add", "path": "/spec/template/metadata/labels/app.kubernetes.io~1part-of", "value": "fedcore"}, {"op": "add", "path": "/spec/template/metadata/labels/fedcore.io~1component", "value": component_id(component)}])
      target:
        kind: StatefulSet
    #! Patch DaemonSets to add labels to pod templates
    - patch: #@ yaml.encode([{"op": "add", "path": "/spec/template/metadata/labels/app.kubernetes.io~1part-of", "value": "fedcore"}, {"op": "add", "path": "/spec/template/metadata/labels/fedcore.io~1component", "value": component_id(component)}])
      target:
        kind: DaemonSet
#@ if hasattr(component, "depends_on") and component.depends_on:
  dependsOn:
#@   for dep in component.depends_on:
    - name: #@ dep
      namespace: #@ data.values.component_sources_namespace
#@   end
#@ end
---
#@ end

#! Bootstrap Secrets and ConfigMaps
#! ==================================
#! These resources are only created if configured in cluster schema

#! Image Pull Secret for private registries
#@ if hasattr(data.values, 'dockerconfigjson') and data.values.dockerconfigjson:
---
apiVersion: v1
kind: Secret
metadata:
  name: #@ data.values.image_pull_secret_name
  namespace: #@ data.values.component_sources_namespace
  labels:
    cluster.fedcore.io/bootstrap: "true"
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: #@ data.values.dockerconfigjson
#@ end

#! CA Certificates Secret (for OCIRepository certSecretRef)
#@ if hasattr(data.values, 'ca_bundle') and data.values.ca_bundle:
---
apiVersion: v1
kind: Secret
metadata:
  name: #@ data.values.ca_certificates_name
  namespace: #@ data.values.component_sources_namespace
  labels:
    cluster.fedcore.io/bootstrap: "true"
type: Opaque
stringData:
  ca.crt: #@ data.values.ca_bundle
#@ end

#! CA Certificates ConfigMap (for mounting in Flux controllers via overlay)
#@ if hasattr(data.values, 'ca_bundle') and data.values.ca_bundle:
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: #@ data.values.ca_certificates_name + "-configmap"
  namespace: #@ data.values.component_sources_namespace
  labels:
    cluster.fedcore.io/bootstrap: "true"
data:
  ca-bundle.crt: #@ data.values.ca_bundle
#@ end
