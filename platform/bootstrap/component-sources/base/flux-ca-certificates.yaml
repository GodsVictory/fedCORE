#@ load("@ytt:overlay", "overlay")
#@ load("@ytt:data", "data")

#! Patch Flux source-controller to mount CA certificates
#! =======================================================
#! This overlay is conditionally applied during bootstrap if:
#! - ca_bundle is provided in cluster.yaml
#! - Flux source-controller Deployment exists (bootstrap context)
#!
#! During component builds, this overlay does nothing (expects="0+")

#! Only apply if CA bundle is provided in cluster config
#@ if hasattr(data.values, 'ca_bundle') and data.values.ca_bundle:

#! Patch Flux source-controller Deployment to mount CA certificates
#@overlay/match by=overlay.subset({"kind": "Deployment", "metadata": {"name": "source-controller", "namespace": data.values.flux.namespace}}), expects="0+"
---
spec:
  template:
    spec:
      containers:
      #@overlay/match by="name"
      - name: manager
        #@overlay/match missing_ok=True
        env:
        #@overlay/append
        - name: SSL_CERT_FILE
          value: #@ "/etc/{}/ca-bundle.crt".format(data.values.ca_certificates_name)
        #@overlay/match missing_ok=True
        volumeMounts:
        #@overlay/append
        - name: ca-certificates
          mountPath: #@ "/etc/{}".format(data.values.ca_certificates_name)
          readOnly: true
      #@overlay/match missing_ok=True
      volumes:
      #@overlay/append
      - name: ca-certificates
        configMap:
          name: #@ data.values.ca_certificates_name + "-configmap"

#@ end
