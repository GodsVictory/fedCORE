#@data/values-schema
---
#! Cluster Configuration Schema (Minimal)
#! This defines the core data values for cluster configurations.
#! ytt will validate cluster configs against this schema.

#! =============================================================================
#! Physical Facts (Required)
#! =============================================================================
#! Unique identifier for this cluster
cluster_name: ""

#! Cloud provider type: aws, azure, onprem
cloud: ""

#! Cloud region (aws/azure) or datacenter identifier (onprem)
region: ""

#! Environment: prod, dev, staging
environment: ""

#! Overlay IDs: list of overlay directory names to apply from each component's overlays/ dir
#! Each ID maps to {component}/overlays/{id}/ — order matters (applied in sequence)
overlays:
  - ""

#! OCI Repository configuration for component artifacts
oci_registry: "registry.example.com"
oci_repository_base: "fedcore"

#! =============================================================================
#! Component Sources Configuration
#! =============================================================================
#! Component OCIRepository and Kustomization resources
#! Namespace where component OCIRepository and Kustomization resources are created
#! These resources reference platform components (Capsule, Kyverno, Istio, etc.)
#! Must be a namespace where Flux controllers can find them:
#!   - If flux.install=true: typically same as flux.namespace
#!   - If flux.install=false: namespace monitored by external Flux instance
#! Recommended: "flux-system" (standard), or custom namespace for tenant scenarios
component_sources_namespace: "flux-system"

#! =============================================================================
#! Cloud-Specific Configuration (Optional)
#! =============================================================================
#@schema/nullable
aws:
  #! AWS Account ID (12-digit number)
  account_id: ""

#@schema/nullable
azure:
  #! Azure Subscription ID
  subscription_id: ""
  #! Resource group containing the AKS cluster
  resource_group: ""
  #! Azure AD Tenant ID
  tenant_id: ""
  #! AKS OIDC issuer URL
  oidc_issuer: ""
  #! Azure region
  region: ""

#@schema/nullable
#! Physical datacenter location for on-prem clusters
datacenter: ""

#! =============================================================================
#! Components
#! =============================================================================
#@schema/type any=True
components: []

#! =============================================================================
#! Tenants
#! =============================================================================
#@schema/type any=True
tenants: []
