#@data/values-schema
---
#! Cluster Configuration Schema (Minimal)
#! This defines the core data values for cluster configurations.
#! ytt will validate cluster configs against this schema.

#! =============================================================================
#! Physical Facts (Required)
#! =============================================================================
#! Unique identifier for this cluster
cluster_name: ""

#! Cloud provider type: aws, azure, onprem
cloud: ""

#! Cloud region (aws/azure) or datacenter identifier (onprem)
region: ""

#! Environment: prod, dev, staging
environment: ""

#! Ingress domain for the cluster
ingress_domain: ""

#! Monitoring & Observability
monitoring:
  enabled: false

#! Tenant Policies (Multi-Tenancy with Capsule + Kyverno)
tenant_policies:
  #! Image registry enforcement
  allowed_registries:
    - ""

#! Overlay IDs: list of overlay directory names to apply from each component's overlays/ dir
#! Each ID maps to {component}/overlays/{id}/ — order matters (applied in sequence)
overlays:
  - ""

#! OCI Repository configuration for component artifacts
oci_registry: "registry.example.com"
oci_repository_base: "fedcore"

#! Helm Repository Configuration
helm_repositories:
  #! Use mirrored Helm charts and container images from internal registries
  use_mirror: false
  #! Base OCI registry hostname for mirrored charts and container images
  oci_registry: ""
  #! Path under oci_registry where mirrored Helm charts are stored
  chart_repo: ""

#! =============================================================================
#! Component Sources Configuration
#! =============================================================================
#! Component OCIRepository and Kustomization resources
#! Namespace where component OCIRepository and Kustomization resources are created
#! These resources reference platform components (Capsule, Kyverno, Istio, etc.)
#! Must be a namespace where Flux controllers can find them:
#!   - If flux.install=true: typically same as flux.namespace
#!   - If flux.install=false: namespace monitored by external Flux instance
#! Recommended: "flux-system" (standard), or custom namespace for tenant scenarios
component_sources_namespace: "flux-system"

#! =============================================================================
#! Cloud-Specific Configuration (Optional)
#! =============================================================================
#@schema/nullable
aws:
  #! AWS Account ID (12-digit number)
  account_id: ""

#@schema/nullable
azure:
  #! Azure Subscription ID
  subscription_id: ""
  #! Resource group containing the AKS cluster
  resource_group: ""
  #! Azure AD Tenant ID
  tenant_id: ""
  #! AKS OIDC issuer URL
  oidc_issuer: ""
  #! Azure region
  region: ""

#@schema/nullable
#! Physical datacenter location for on-prem clusters
datacenter: ""

#! =============================================================================
#! Bootstrap Configuration
#! =============================================================================
#! OCI registry credentials (substituted by envsubst during bootstrap)
dockerconfigjson: ""

#! =============================================================================
#! Components
#! =============================================================================
components:
- #! Component name (must match a directory under platform/components/ or platform/rgds/)
  #! Maps to the OCI artifact source. Example: "kong" uses platform/components/kong/
  name: ""

  #@schema/nullable
  #! Unique instance identifier for this component deployment
  #! Used as: Flux resource names (OCIRepository, Kustomization), helm release name, OCI artifact name
  #! Defaults to the name value when omitted
  #! Set explicitly when deploying the same component multiple times (e.g., "kong-external", "kong-internal")
  id: ""

  #@schema/nullable
  #! Kubernetes namespace for helm template --namespace
  #! Defaults to the id value when omitted (which itself defaults to name)
  namespace: ""

  #@schema/nullable
  #@schema/type any=True
  #! Override helm flags from component.yaml
  #! When set, fully replaces the component's default flags (no merging)
  #! Example: ["--include-crds", "--set", "proxy.type=LoadBalancer"]
  helm_flags: []

#! =============================================================================
#! Tenants
#! =============================================================================
#@schema/type any=True
tenants: []
