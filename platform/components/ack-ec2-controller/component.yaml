#@ load("@ytt:data", "data")
---
#! Helm chart configuration
helm:
  sourceRepo: oci://public.ecr.aws/aws-controllers-k8s
  chart: ec2-chart
  version: "1.11.0"

  #! Release configuration
  release:
    name: ack-ec2-controller
    namespace: ack-system

  flags: ["--include-crds"]

  #! Values for helm template
  values:
    #! AWS Controller for Kubernetes EC2 Controller
    aws:
      region: #@ data.values.region

    image:
      #@ if data.values.helm_repositories.oci_registry:
      repository: #@ data.values.helm_repositories.oci_registry + "/aws-controllers-k8s/ec2-controller"
      #@ end
      tag: 1.11.0

    #! Disable CARM (replaced by IAMRoleSelector for cross-account)
    enableCARM: false
    featureGates:
      IAMRoleSelector: true
