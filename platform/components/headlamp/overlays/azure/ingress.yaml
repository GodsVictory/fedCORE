#@ load("@ytt:data", "data")

#! Azure-specific Headlamp configuration
#!
#! Configures Headlamp with Azure-specific ingress

#! overlay-phase: post-render
#! Create Ingress resource for Azure
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: headlamp
  namespace: headlamp
  annotations:
    #! NGINX Ingress annotations
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
    #! TODO: If using Azure Application Gateway Ingress Controller (AGIC), use these instead:
    #! appgw.ingress.kubernetes.io/ssl-redirect: "true"
    #! appgw.ingress.kubernetes.io/backend-protocol: http
spec:
  ingressClassName: nginx
  rules:
  - host: #@ "headlamp.{}.{}".format(data.values.cluster_name, data.values.ingress_domain)
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: headlamp
            port:
              number: 80
  tls:
  - hosts:
    - #@ "headlamp.{}.{}".format(data.values.cluster_name, data.values.ingress_domain)
    #! TODO: Ensure 'headlamp-tls' TLS secret exists in headlamp namespace before enabling ingress
    secretName: headlamp-tls
