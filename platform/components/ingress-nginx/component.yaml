#@ load("@ytt:data", "data")
---
#! Helm chart configuration
helm:
  sourceRepo: https://kubernetes.github.io/ingress-nginx
  chart: ingress-nginx
  version: "4.14.3"
  mirrorRepo: #@ data.values.helm_repositories.oci_registry_url if data.values.helm_repositories.use_mirror else "https://kubernetes.github.io/ingress-nginx"

  #! Release configuration
  release:
    name: ingress-nginx
    namespace: ingress-nginx

  #! Values for helm template
  values:
    controller:
      #! Controller configuration
      replicaCount: 2

      #! Resource limits
      resources:
        requests:
          memory: 128Mi
        limits:
          cpu: 1000m
          memory: 512Mi

      #! Autoscaling
      autoscaling:
        enabled: true
        minReplicas: 2
        maxReplicas: 5
        targetCPUUtilizationPercentage: 80

      #! Metrics for Prometheus
      metrics:
        enabled: true
        serviceMonitor:
          enabled: #@ data.values.monitoring.enabled or False

      #! Pod anti-affinity for high availability
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: ingress-nginx
                  app.kubernetes.io/component: controller
              topologyKey: topology.kubernetes.io/zone

      #! Configuration options
      config:
        #! Enable real IP forwarding
        use-forwarded-headers: "true"
        compute-full-forwarded-for: "true"

        #! SSL configuration
        ssl-protocols: "TLSv1.2 TLSv1.3"
        ssl-ciphers: "ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384"

        #! Security headers
        hide-headers: "Server,X-Powered-By"

        #! Request size limits
        proxy-body-size: "50m"
        client-max-body-size: "50m"

        #! Timeouts
        proxy-connect-timeout: "60"
        proxy-send-timeout: "60"
        proxy-read-timeout: "60"

        #! Logging
        log-format-upstream: '$remote_addr - $remote_user [$time_local] "$request" $status $body_bytes_sent "$http_referer" "$http_user_agent" $request_length $request_time [$proxy_upstream_name] [$proxy_alternative_upstream_name] $upstream_addr $upstream_response_length $upstream_response_time $upstream_status tenant="$http_x_tenant_name" namespace="$namespace"'
