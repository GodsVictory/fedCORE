#@ load("@ytt:data", "data")
#@ load("@ytt:overlay", "overlay")

#! AWS-specific NGINX Ingress Controller configuration
#! Configures Network Load Balancer and AWS-specific annotations

#! overlay-phase: pre-render
---
#@overlay/match by=overlay.subset({"name": "ingress-nginx"})
---
helm:
  values:
    controller:
      #@overlay/match missing_ok=True
      service:
        #@overlay/match missing_ok=True
        annotations:
          #@overlay/match missing_ok=True
          #! Use AWS Network Load Balancer
          service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
          #! External (internet-facing) load balancer
          service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
          #! Enable cross-zone load balancing
          service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
          #! Connection draining
          service.beta.kubernetes.io/aws-load-balancer-connection-draining-enabled: "true"
          service.beta.kubernetes.io/aws-load-balancer-connection-draining-timeout: "60"
          #! Backend protocol
          service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
          #! Cost allocation tags
          service.beta.kubernetes.io/aws-load-balancer-additional-resource-tags: #@ "cluster=" + data.values.cluster_name + ",component=ingress-nginx,managed-by=fedcore"
