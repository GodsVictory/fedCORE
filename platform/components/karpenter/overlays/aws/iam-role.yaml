---
#! Karpenter Controller IAM Role and Policy
#!
#! Provisioned via ACK IAM controller. The controller role is assumed via
#! Pod Identity (EKS) by the Karpenter controller pods.
#!
#! Policy statements match the official Karpenter CloudFormation template:
#! https://karpenter.sh/docs/reference/cloudformation/
#!
#! Tag-scoped permissions ensure Karpenter can only manage resources it owns.

apiVersion: v1
kind: Namespace
metadata:
  name: karpenter
  labels:
    name: karpenter
    platform.fedcore.io/cluster: #@ cluster
---
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Role
metadata:
  name: #@ cluster + "-karpenter-controller"
  namespace: karpenter
  labels:
    platform.fedcore.io/cluster: #@ cluster
    platform.fedcore.io/component: karpenter
spec:
  name: #@ cluster + "-KarpenterControllerRole"
  description: #@ "Karpenter controller role for cluster " + cluster
  assumeRolePolicyDocument: #@ json.encode({"Version": "2012-10-17", "Statement": [{"Effect": "Allow", "Principal": {"Service": "pods.eks.amazonaws.com"}, "Action": ["sts:AssumeRole", "sts:TagSession"]}]})
  policies: []
  tags:
  - key: "platform.fedcore.io/cluster"
    value: #@ cluster
  - key: "platform.fedcore.io/managed-by"
    value: "ack-iam-controller"
  - key: "platform.fedcore.io/component"
    value: "karpenter"
---
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Policy
metadata:
  name: #@ cluster + "-karpenter-controller-policy"
  namespace: karpenter
  labels:
    platform.fedcore.io/cluster: #@ cluster
    platform.fedcore.io/component: karpenter
spec:
  name: #@ cluster + "-KarpenterControllerPolicy"
  description: #@ "Karpenter controller permissions for cluster " + cluster
  policyDocument: #@ json.encode(karpenter_controller_policy())
  tags:
  - key: "platform.fedcore.io/cluster"
    value: #@ cluster
  - key: "platform.fedcore.io/managed-by"
    value: "ack-iam-controller"
  - key: "platform.fedcore.io/component"
    value: "karpenter"
---
#! Node IAM Role for instances launched by Karpenter
apiVersion: iam.services.k8s.aws/v1alpha1
kind: Role
metadata:
  name: #@ cluster + "-karpenter-node"
  namespace: karpenter
  labels:
    platform.fedcore.io/cluster: #@ cluster
    platform.fedcore.io/component: karpenter
spec:
  name: #@ cluster + "-KarpenterNodeRole"
  description: #@ "IAM role for nodes launched by Karpenter in cluster " + cluster
  assumeRolePolicyDocument: #@ json.encode({"Version": "2012-10-17", "Statement": [{"Effect": "Allow", "Principal": {"Service": "ec2.amazonaws.com"}, "Action": "sts:AssumeRole"}]})
  managedPolicies:
  - "arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy"
  - "arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy"
  - "arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly"
  - "arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore"
  tags:
  - key: "platform.fedcore.io/cluster"
    value: #@ cluster
  - key: "platform.fedcore.io/managed-by"
    value: "ack-iam-controller"
  - key: "platform.fedcore.io/component"
    value: "karpenter-node"
