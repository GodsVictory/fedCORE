---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kro:core-resources
  labels:
    rbac.kro.run/aggregate-to-controller: "true"
    app.kubernetes.io/name: kro
    app.kubernetes.io/component: rbac
    platform.fedcore.io/managed: "true"
  annotations:
    kubernetes.io/description: |
      Grants kro controller access to core Kubernetes resources that RGDs commonly create.
      This ClusterRole is automatically aggregated into the main kro:controller ClusterRole.
rules:
# Core resources
- apiGroups: [""]
  resources:
  - namespaces
  - serviceaccounts
  - secrets
  - services
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

# RBAC resources
- apiGroups: ["rbac.authorization.k8s.io"]
  resources:
  - rolebindings
  - clusterrolebindings
  - roles
  - clusterroles
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

# Workload resources
- apiGroups: ["apps"]
  resources:
  - deployments
  - statefulsets
  - daemonsets
  - replicasets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

# Networking resources
- apiGroups: ["networking.k8s.io"]
  resources:
  - ingresses
  - networkpolicies
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

# Autoscaling resources
- apiGroups: ["autoscaling"]
  resources:
  - horizontalpodautoscalers
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch

# Batch resources
- apiGroups: ["batch"]
  resources:
  - jobs
  - cronjobs
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
