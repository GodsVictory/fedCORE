#@ load("@ytt:overlay", "overlay")
#@ load("@ytt:data", "data")

#! Image Registry Overlay for KRO
#! Swaps the default registry.k8s.io to the cluster's configured OCI registry

#@overlay/match by=overlay.subset({"kind": "Deployment", "metadata": {"name": "kro", "namespace": "kro-system"}})
---
spec:
  template:
    spec:
      containers:
        #@overlay/match by=overlay.subset({"name": "kro"})
        #@ if data.values.helm_repositories.oci_registry:
        - image: #@ data.values.helm_repositories.oci_registry + "/kro/kro:v0.8.5"
        #@ end
