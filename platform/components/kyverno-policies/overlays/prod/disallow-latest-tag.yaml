#@ load("@ytt:data", "data")

---
#! Production cluster overlay: Disallow :latest tag
#! This ensures reproducible deployments and prevents unexpected updates

apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-latest-tag
  labels:
    platform.fedcore.io/cluster: #@ data.values.cluster_name
    platform.fedcore.io/environment: production
    platform.fedcore.io/overlay: cluster-specific
  annotations:
    policies.kyverno.io/title: Disallow Latest Tag
    policies.kyverno.io/category: Best Practices
    policies.kyverno.io/severity: medium
    policies.kyverno.io/subject: Pod
    policies.kyverno.io/description: >-
      Container images in production must use specific version tags, not :latest.
      This ensures reproducible deployments and prevents unexpected updates.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
  - name: require-specific-tag
    match:
      any:
      - resources:
          kinds:
          - Pod
    validate:
      message: >-
        Container images must use specific version tags, not ':latest'.
        Production deployments require pinned versions for reproducibility.
      pattern:
        spec:
          containers:
          - image: "!*:latest"
