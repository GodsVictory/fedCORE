---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flux-deployer
  namespace: {target}
  labels:
    app.kubernetes.io/part-of: fedcore
rules:
  - apiGroups: ["", "apps", "batch", "networking.k8s.io", "autoscaling", "policy"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flux-deployer
  namespace: {target}
  labels:
    app.kubernetes.io/part-of: fedcore
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flux-deployer
subjects:
  - kind: ServiceAccount
    name: kustomize-controller
    namespace: {ns}
