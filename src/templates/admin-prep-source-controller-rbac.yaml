---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flux-source-controller
  namespace: {ns}
  labels:
    app.kubernetes.io/part-of: fedcore
rules:
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources: ["ocirepositories", "ocirepositories/status", "ocirepositories/finalizers"]
    verbs: ["*"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flux-source-controller
  namespace: {ns}
  labels:
    app.kubernetes.io/part-of: fedcore
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flux-source-controller
subjects:
  - kind: ServiceAccount
    name: source-controller
    namespace: {ns}
